controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 30.00
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    odom_topic: /trailobot/odom

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: True

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      min_vel_x: 0.00
      max_vel_x: 1.20
      max_vel_y: 0.0
      min_vel_y: 0.0
      max_vel_theta: 2.00
      min_speed_xy: 0.0
      max_speed_xy: 1.20
      acc_lim_x: 2.50
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      acc_lim_trans: 2.50
      acc_lim_rot: 3.2
      decel_lim_x: -2.5
      decel_lim_theta: -3.2
      vx_samples: 20
      vy_samples: 0
      vtheta_samples: 20
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      rot_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: True
      stateful: True
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      
      BaseObstacle:
        enabled: true
        scale: 1.02
        type: "dwb_critics::BaseObstacleCritic"
      
      PathAlign:
        enabled: true
        scale: 32.00
        forward_point_distance: 0.1
        type: "dwb_critics::PathAlignCritic"
      
      GoalAlign:
        enabled: true
        scale: 24.00
        forward_point_distance: 0.1
        type: "dwb_critics::GoalAlignCritic"
      
      PathDist:
        enabled: true
        scale: 32.00
        type: "dwb_critics::PathDistCritic"
      
      GoalDist:
        enabled: true
        scale: 24.00
        type: "dwb_critics::GoalDistCritic"
      
      RotateToGoal:
        enabled: true
        scale: 35.00
        slowing_factor: 5.0
        lookahead_time: -1.0
        type: "dwb_critics::RotateToGoalCritic"
      
      

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True