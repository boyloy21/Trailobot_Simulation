    #   - backup
    #   - compute_path
    #   - dock_robot
    #   - drive_on_heading
    #   - follow_path
    #   - nav_thru_poses
    #   - nav_to_pose
    #   - spin
    #   - route
    #   - undock_robot
    #   - wait
    
bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: True

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: True

### *** MPPI CONTROLLER *** ####
controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 40.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    odom_topic: /trailobot/odom  # MAKE SURE THIS IS CORRECT!

    # Progress checker
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    # Goal checker
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: True
    
    # MPPI parameters
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 60     # Number Prediction Steps in the horizon(50-80) (higher: Better obstacle anticipation, smoother paths, Lower: Faster computation, less future prediction)
      model_dt: 0.05     # Time between prediction steps (high: faster computation, Lower: Finer prediction)
      batch_size: 2500   # Number of trajectories to generate each iteration (1000-3000) [hiher: Better solution quality, slower computation, Lower: Faster computation, potentially worse paths]
      vx_std: 0.2        # Linear velocity noise standard deviation (0.1-0.5)
      vy_std: 0.0        
      wz_std: 0.3        # Angular velocity noise standard deviation (0.1-0.4)
      vx_max: 1.0        # Maximum forward velocity (0.3-2.0) (Higher: Faster movement, harder to control,  Lower: Slower, smoother, better precision)
      vx_min: -1.0
      vx_min: -0.35
      vy_max: 0.0
      wz_max: 1.5        # Maximum angular velocity (0.5-2.0) (Higher: Faster turning, more oscillation, Lower: Straighter lines, smoother rotation)
      wz_min: -1.5
      ax_max: 2.5              # Lower acceleration for smoothness
      ax_min: -2.5
      ay_min: -2.5
      ay_max: 2.5
      az_max: 2.5
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.1
      temperature: 0.2   # Controls exploration vs exploitation (0.1-0.5) (Higher: More random exploration, better obstacle avoidance, Lower: More deterministic, smoother paths)
      gamma: 0.02           # Discount factor for future costs (0.01-0.05) (Higher: Focus on immediate costs, more reactive, Lower: Consider future costs, more planning)
      motion_model: "DiffDrive"
      visualize: false
      reset_period: 1.0 # (only in Humble)
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      TrajectoryValidator:
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 2.0
        consider_footprint: false
      AckermannConstraints:
        min_turning_r: 0.2
      # Cost weights
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", 
                "PreferForwardCritic", "PathAlignCritic", "PathFollowCritic", "TwirlingCritic"]

      # Enforce kinematic constraints (2.0-5.0)
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0  # (Higher: More physically feasible trajectories, Lower: More aggressive, potentially infeasible)

      # Move toward goal position (4-10)
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0    # Higher: More goal-directed, faster arrival, Lower: More path-focused, smoother approach
        threshold_to_consider: 1.4

      # Align with final goal orientation (1-8)
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0    # Higher: Better goal alignment, but can cause over-rotation,  Lower: Smoother approach, but may not align perfectly
        threshold_to_consider: 0.5

      # Prefer forward movement over backward/reverse
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 20.0     # (5-125)
        threshold_to_consider: 0.3    # Reduced from 0.5

      # Costmap-based obstacle avoidance
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0   # Higher: Very obstacle-aware, conservative movement, Lower: More aggressive, closer to obstacles
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2

      # Align robot orientation with path direction (Higher: Tighter path following, better straight lines, Lower: More deviation from path, smoother around obstacles)
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 20.0    # Straight Line Range: 25-30, Obstacle-rich Range: 18-22
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.3    # Reduced from 0.5
        offset_from_furthest: 15      # Reduced from 20
        use_path_orientations: false
      
      # Increase PathFollowCritic for better straight line tracking  Follow path position (not orientation)
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0     # (8-20)
        offset_from_furthest: 3       # Reduced from 5
        threshold_to_consider: 1.0    # Reduced from 1.4
      
      # Configure the new critics:
      # VelocityDeadbandCritic:
      #   enabled: true
      #   cost_power: 1
      #   cost_weight: 5.0
      #   deadband_velocities: [0.04, 0.04, 0.05]  # vx, vy, wz

      TwirlingCritic:
        enabled: true
        twirling_cost_power: 1
        twirling_cost_weight: 10.0

