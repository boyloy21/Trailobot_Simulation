bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: True

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: True

velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 30.0  # Increased for high-speed smoothing
    scale_velocities: True     # Enable for safety at high speed
    feedback: "CLOSED_LOOP"
    max_velocity: [0.85, 0.0, 1.0]    # Your high-speed limits
    min_velocity: [-0.25, 0.0, -1.0]
    max_accel: [1.5, 0.0, 2.0]        # Higher acceleration for responsiveness
    max_decel: [-2.0, 0.0, -2.5]      # Stronger deceleration for safety
    odom_topic: "/trailobot/odom"
    odom_duration: 0.1
    deadband_velocity: [0.01, 0.0, 0.01]  # Tighter deadband for precision
    velocity_timeout: 0.5  # Reduced for faster response

### *** MPPI CONTROLLER *** ####
controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 30.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    odom_topic: /trailobot/odom  # MAKE SURE THIS IS CORRECT!

    # Progress checker
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.40
      movement_time_allowance: 6.0

    # Goal checker
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.30
      stateful: True
    
    # MPPI parameters
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 60     # Number Prediction Steps in the horizon(50-80) (higher: Better obstacle anticipation, smoother paths, Lower: Faster computation, less future prediction)
      model_dt: 0.05     # Time between prediction steps (high: faster computation, Lower: Finer prediction)
      batch_size: 2500   # Number of trajectories to generate each iteration (1000-3000) [hiher: Better solution quality, slower computation, Lower: Faster computation, potentially worse paths]
      vx_std: 0.18        # Linear velocity noise standard deviation (0.1-0.5)
      vy_std: 0.0        
      wz_std: 0.22        # Angular velocity noise standard deviation (0.1-0.4)
      vx_max: 0.85        # Maximum forward velocity (0.3-2.0) (Higher: Faster movement, harder to control,  Lower: Slower, smoother, better precision)
      vx_min: -0.15
      vy_max: 0.0
      wz_max: 1.0        # Maximum angular velocity (0.5-2.0) (Higher: Faster turning, more oscillation, Lower: Straighter lines, smoother rotation)
      wz_min: -1.0
      ax_max: 2.0              # Lower acceleration for smoothness
      ax_min: -2.5
      ay_min: -0.0
      ay_max: 0.0
      az_max: 2.0
      az_min: -2.5
      iteration_count: 1
      prune_distance: 3.0
      transform_tolerance: 0.1
      temperature: 0.22   # Controls exploration vs exploitation (0.1-0.5) (Higher: More random exploration, better obstacle avoidance, Lower: More deterministic, smoother paths)
      gamma: 0.02           # Discount factor for future costs (0.01-0.05) (Higher: Focus on immediate costs, more reactive, Lower: Consider future costs, more planning)
      motion_model: "DiffDrive"
      visualize: false
      reset_period: 1.0 # (only in Humble)
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 4
        time_step: 2
      TrajectoryValidator:
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 2.0
        consider_footprint: false
      AckermannConstraints:
        min_turning_r: 0.3
      # Cost weights
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", 
                "PathAlignCritic", "PathFollowCritic", "PathAngleCritic",
                "PreferForwardCritic", "ObstaclesCritic", "TwirlingCritic", "VelocityDeadbandCritic"]

      # Constraint critic - Ensure feasibility at high speed
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 9.0  # Increased for high-speed safety

      # Goal pursuit - More aggressive at high speed
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 9.0    # Increased for direct goal pursuit
        threshold_to_consider: 2.5  # Increased threshold

      # Goal orientation - Less strict at high speed
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0    # Reduced to prevent over-rotation at speed
        threshold_to_consider: 1.2  # Increased threshold

      # Strong forward preference for high-speed efficiency
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 30.0    # Increased to minimize reversing at speed
        threshold_to_consider: 0.7

      # CRITICAL: Enhanced obstacle avoidance for high-speed safety
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 10.0     # Increased repulsion
        critical_weight: 60.0      # Greatly increased for safety
        consider_footprint: true   # Enable for accurate collision checking
        collision_cost: 150000.0   # Higher collision penalty
        collision_margin_distance: 0.30  # Increased safety margin
        near_goal_distance: 1.5    # Increased distance
        inflation_radius: 0.8      # Larger inflation for safety
        cost_scaling_factor: 30.0  # Sharper cost gradient

      # Costmap-based obstacle avoidance - Conservative at high speed
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 18.0   # Increased for conservative operation
        critical_cost: 1500.0
        consider_footprint: true
        collision_cost: 4000000.0  # Higher collision cost
        near_goal_distance: 1.2
        trajectory_point_step: 1   # Check every point

      # Path following - Strong for high-speed trajectory tracking
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 25.0     # Increased for reliable path tracking
        offset_from_furthest: 5
        threshold_to_consider: 2.0  # Increased threshold

      # Path alignment - Important for high-speed stability
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 22.0    # Increased for straight-line stability
        max_path_occupancy_ratio: 0.10  # Increased to allow more deviation
        trajectory_point_step: 2
        threshold_to_consider: 0.8
        offset_from_furthest: 6
        use_path_orientations: false

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 7.0
        offset_from_furthest: 10
        threshold_to_consider: 0.22
        max_angle_to_furthest: 0.30
        mode: 0  # 0: Angle to furthest path point, 1: Angle to goal

      VelocityDeadbandCritic:
        enabled: true
        cost_power: 1
        cost_weight: 28.0
        deadband_velocities: [0.015, 0.015, 0.015]

      # Reduce unnecessary rotation at high speed
      TwirlingCritic:
        enabled: true
        twirling_cost_power: 1
        twirling_cost_weight: 25.0  # Increased to prevent dangerous spinning

    
controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 20.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      footprint: "[[-0.6, -0.4], [-0.6, 0.4], [0.6, 0.4], [0.6, -0.4]]"
      plugins: ["obstacle_layer", "voxel_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan 
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          marking: True
          clearing: True
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          raytrace_min_range: 0.1
          obstacle_max_range: 6.0
          obstacle_min_range: 0.1
          clearing_decay_velocity: 25.0  # Faster clearing of old obstacles

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.8

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: False
        origin_z: 0.0
        z_resolution: 0.15
        z_voxels: 12
        max_obstacle_height: 2.0
        mark_threshold: 1
        observation_sources: depth_right depth_left
        depth_right:
          topic: /trailobot/depth_camera_right/points
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05
          clearing: True
          marking: True
          data_type: "PointCloud2"
          obstacle_max_range: 5.0
          obstacle_min_range: 0.2
          raytrace_max_range: 5.0
          raytrace_min_range: 0.2
        depth_left:
          topic: /trailobot/depth_camera_left/points
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05
          clearing: True
          marking: True
          data_type: "PointCloud2"
          obstacle_max_range: 5.0
          obstacle_min_range: 0.2
          raytrace_max_range: 5.0
          raytrace_min_range: 0.2
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True
  local_costmap_client:
    ros__parameters:
      use_sim_time: True
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 3.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      footprint: "[[-0.6, -0.4], [-0.6, 0.4], [0.6, 0.4], [0.6, -0.4]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "voxel_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        enabled: true
        subscribe_to_updates: true
        transform_tolerance: 0.1
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.1
          obstacle_max_range: 8.0
          obstacle_min_range: 0.5

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: False
        origin_z: 0.0
        z_resolution: 0.2
        z_voxels: 10
        min_obstacle_height: 0.1
        mark_threshold: 0
        combination_method: 1  # Overwrite (1), Maximum (0)
        observation_sources: depth_right depth_left
        depth_right:
          topic: /trailobot/depth_camera_right/points
          max_obstacle_height: 2.0
          min_obstacle_height: 0.1
          obstacle_max_range: 4.0
          obstacle_min_range: 0.3
          raytrace_max_range: 4.0
          raytrace_min_range: 0.3
          clearing: True
          marking: True
          data_type: "PointCloud2"
        depth_left:
          topic: /trailobot/depth_camera_left/points
          max_obstacle_height: 2.0
          min_obstacle_height: 0.1
          obstacle_max_range: 4.0
          obstacle_min_range: 0.3
          raytrace_max_range: 4.0
          raytrace_min_range: 0.3
          clearing: True
          marking: True
          data_type: "PointCloud2"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5
        inflation_radius: 0.9
      always_send_full_costmap: True
  global_costmap_client:
    ros__parameters:
      use_sim_time: True
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True


map_server:
  ros__parameters:
    use_sim_time: True
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: "map/current_map.yaml"
    free_thresh: 0.25
    occupied_thresh: 0.65
    # This is important for unknown cells
    track_unknown_space: true

map_saver:
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 15.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false     # Dijkstra for smoother paths at speed
      allow_unknown: false

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True

recoveries_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_recoveries/Spin"
    backup:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_timeout: 0.1
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.8
    min_rotational_vel: 0.3
    rotational_acc_lim: 3.2

smoother_server:
  ros__parameters:
    use_sim_time: True
    costmap_topic: global_costmap/costmap_raw
    footprint_topic: global_costmap/published_footprint
    robot_base_frame: base_link
    transform_tolerance: 0.1
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 20.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
      wait_time: 1.0
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: true
    simulate_ahead_time: 1.2
    max_rotational_vel: 1.2
    min_rotational_vel: 0.5
    rotational_acc_lim: 3.5

robot_state_publisher:
  ros__parameters:
    use_sim_time: True

waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200


collision_monitor:
  ros__parameters:
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "/trailobot/cmd_vel"
    polygons: ["PolygonStop", "PolygonSlow"]

    PolygonStop:
      type: "circle"
      radius: 0.5
      action_type: "stop"
      enabled: True

    PolygonSlow:
      type: "circle"
      radius: 1.5
      action_type: "slowdown"
      slowdown_ratio: 0.4
      enabled: True

