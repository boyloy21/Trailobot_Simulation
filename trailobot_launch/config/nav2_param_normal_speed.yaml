bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /trailobot/odom
    bt_loop_duration: 20
    default_server_timeout: 15
    wait_for_service_timeout: 30
    action_server_result_timeout: 300.0
    navigators: ['navigate_to_pose', 'navigate_through_poses']
