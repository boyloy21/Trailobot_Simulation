bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: True

velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 25.0
    scale_velocities: False
    feedback: "CLOSED_LOOP"
    max_velocity: [0.55, 0.0, 0.70]
    min_velocity: [-0.20, 0.0, -0.70]
    max_accel: [1.0, 0.0, 1.2]
    max_decel: [-1.0, 0.0, -1.2]
    odom_topic: "/trailobot/odom"
    odom_duration: 0.1
    deadband_velocity: [0.01, 0.0, 0.01]
    velocity_timeout: 1.0

### *** MPPI CONTROLLER *** ####
controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 25.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    odom_topic: /trailobot/odom  # MAKE SURE THIS IS CORRECT!

    # Progress checker
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.20
      movement_time_allowance: 10.0

    # Goal checker
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.12
      yaw_goal_tolerance: 0.12
      stateful: True
    
    # MPPI parameters
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 45     # Number Prediction Steps in the horizon(50-80) (higher: Better obstacle anticipation, smoother paths, Lower: Faster computation, less future prediction)
      model_dt: 0.06     # Time between prediction steps (high: faster computation, Lower: Finer prediction)
      batch_size: 1800   # Number of trajectories to generate each iteration (1000-3000) [hiher: Better solution quality, slower computation, Lower: Faster computation, potentially worse paths]
      vx_std: 0.10        # Linear velocity noise standard deviation (0.1-0.5)
      vy_std: 0.0        
      wz_std: 0.12        # Angular velocity noise standard deviation (0.1-0.4)
      vx_max: 0.55        # Maximum forward velocity (0.3-2.0) (Higher: Faster movement, harder to control,  Lower: Slower, smoother, better precision)
      vx_min: -0.2
      vy_max: 0.0
      wz_max: 0.7        # Maximum angular velocity (0.5-2.0) (Higher: Faster turning, more oscillation, Lower: Straighter lines, smoother rotation)
      wz_min: -0.7
      ax_max: 1.2              # Lower acceleration for smoothness
      ax_min: -1.5
      ay_min: -0.0
      ay_max: 0.0
      az_max: 1.8
      az_min: -1.8
      iteration_count: 1
      prune_distance: 1.8
      transform_tolerance: 0.1
      temperature: 0.15   # Controls exploration vs exploitation (0.1-0.5) (Higher: More random exploration, better obstacle avoidance, Lower: More deterministic, smoother paths)
      gamma: 0.04           # Discount factor for future costs (0.01-0.05) (Higher: Focus on immediate costs, more reactive, Lower: Consider future costs, more planning)
      motion_model: "DiffDrive"
      visualize: false
      reset_period: 1.0 # (only in Humble)
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      TrajectoryValidator:
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 2.0
        consider_footprint: false
      AckermannConstraints:
        min_turning_r: 0.4
      # Cost weights
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", 
                "PathAlignCritic", "PathFollowCritic", "PathAngleCritic",
                "PreferForwardCritic", "ObstaclesCritic", "TwirlingCritic", 
                "VelocityDeadbandCritic"]

      # Enforce kinematic constraints (2.0-5.0)
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 7.0  # (Higher: More physically feasible trajectories, Lower: More aggressive, potentially infeasible)

      # Move toward goal position (4-10)
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.5    # Higher: More goal-directed, faster arrival, Lower: More path-focused, smoother approach
        threshold_to_consider: 1.2

      # Align with final goal orientation (1-8)
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 7.0    # Higher: Better goal alignment, but can cause over-rotation,  Lower: Smoother approach, but may not align perfectly
        threshold_to_consider: 0.4

      # Prefer forward movement over backward/reverse
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 18.0     # (5-125)
        threshold_to_consider: 0.5    # Reduced from 0.5

      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 4.0
        critical_weight: 35.0
        consider_footprint: false
        collision_cost: 30000.0
        collision_margin_distance: 0.18
        near_goal_distance: 0.7
        inflation_radius: 0.55
        cost_scaling_factor: 16.0

      # Costmap-based obstacle avoidance
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0   # Higher: Very obstacle-aware, conservative movement, Lower: More aggressive, closer to obstacles
        critical_cost: 750.0
        consider_footprint: true
        collision_cost: 1500000.0
        near_goal_distance: 0.6
        trajectory_point_step: 2

      # Align robot orientation with path direction (Higher: Tighter path following, better straight lines, Lower: More deviation from path, smoother around obstacles)
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 16.0    # Straight Line Range: 25-30, Obstacle-rich Range: 18-22
        max_path_occupancy_ratio: 0.06
        trajectory_point_step: 3
        threshold_to_consider: 0.4    # Reduced from 0.5
        offset_from_furthest: 10      # Reduced from 20
        use_path_orientations: false
      
      # Increase PathFollowCritic for better straight line tracking  Follow path position (not orientation)
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 18.0     # (8-20)
        offset_from_furthest: 7       # Reduced from 5
        threshold_to_consider: 1.0    # Reduced from 1.4

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 7.0
        offset_from_furthest: 10
        threshold_to_consider: 0.22
        max_angle_to_furthest: 0.30
        mode: 0
      
      VelocityDeadbandCritic:
        enabled: true
        cost_power: 1
        cost_weight: 28.0
        deadband_velocities: [0.015, 0.015, 0.015]
      TwirlingCritic:
        enabled: true
        twirling_cost_power: 1
        twirling_cost_weight: 12.0
    

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 15.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      footprint: "[[-0.6, -0.4], [-0.6, 0.4], [0.6, 0.4], [0.6, -0.4]]"
      plugins: ["obstacle_layer", "voxel_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan 
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          marking: True
          clearing: True
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.1
          obstacle_max_range: 5.0
          obstacle_min_range: 0.1
          clearing_decay_velocity: 20.0  # Faster clearing of old obstacles

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5
        inflation_radius: 0.4

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: False
        origin_z: 0.0
        z_resolution: 0.15
        z_voxels: 12
        max_obstacle_height: 2.0
        mark_threshold: 1
        observation_sources: depth_right depth_left
        depth_right:
          topic: /trailobot/depth_camera_right/points
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05
          clearing: True
          marking: True
          data_type: "PointCloud2"
          obstacle_max_range: 4.0
          obstacle_min_range: 0.2
          raytrace_max_range: 4.0
          raytrace_min_range: 0.2
        depth_left:
          topic: /trailobot/depth_camera_left/points
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05
          clearing: True
          marking: True
          data_type: "PointCloud2"
          obstacle_max_range: 4.0
          obstacle_min_range: 0.2
          raytrace_max_range: 4.0
          raytrace_min_range: 0.2
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True
  local_costmap_client:
    ros__parameters:
      use_sim_time: True
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      footprint: "[[-0.6, -0.4], [-0.6, 0.4], [0.6, 0.4], [0.6, -0.4]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "voxel_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        enabled: true
        subscribe_to_updates: true
        transform_tolerance: 0.1
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.1
          obstacle_max_range: 8.0
          obstacle_min_range: 0.5

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: False
        origin_z: 0.0
        z_resolution: 0.2
        z_voxels: 10
        min_obstacle_height: 0.1
        mark_threshold: 0
        combination_method: 1  # Overwrite (1), Maximum (0)
        observation_sources: depth_right depth_left
        depth_right:
          topic: /trailobot/depth_camera_right/points
          max_obstacle_height: 2.0
          min_obstacle_height: 0.1
          obstacle_max_range: 4.0
          obstacle_min_range: 0.3
          raytrace_max_range: 4.0
          raytrace_min_range: 0.3
          clearing: True
          marking: True
          data_type: "PointCloud2"
        depth_left:
          topic: /trailobot/depth_camera_left/points
          max_obstacle_height: 2.0
          min_obstacle_height: 0.1
          obstacle_max_range: 4.0
          obstacle_min_range: 0.3
          raytrace_max_range: 4.0
          raytrace_min_range: 0.3
          clearing: True
          marking: True
          data_type: "PointCloud2"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.2
        inflation_radius: 0.75
      always_send_full_costmap: True
  global_costmap_client:
    ros__parameters:
      use_sim_time: True
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True


map_server:
  ros__parameters:
    use_sim_time: True
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: "/map/current_map.yaml"

map_saver:
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true     # Dijkstra for smoother paths at speed
      allow_unknown: false

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True

recoveries_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_recoveries/Spin"
    backup:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_timeout: 0.1
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.8
    min_rotational_vel: 0.3
    rotational_acc_lim: 3.2

smoother_server:
  ros__parameters:
    use_sim_time: True
    costmap_topic: global_costmap/costmap_raw
    footprint_topic: global_costmap/published_footprint
    robot_base_frame: base_link
    transform_tolerance: 0.1
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 15.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
      wait_time: 2.0
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: true
    simulate_ahead_time: 1.5
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.0

robot_state_publisher:
  ros__parameters:
    use_sim_time: True

waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200


collision_monitor:
  ros__parameters:
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "/trailobot/cmd_vel"
    polygons: ["PolygonStop", "PolygonSlow"]

    PolygonStop:
      type: "circle"
      radius: 0.35
      action_type: "stop"
      enabled: True

    PolygonSlow:
      type: "circle"
      radius: 1.0
      action_type: "slowdown"
      slowdown_ratio: 0.6
      enabled: True

